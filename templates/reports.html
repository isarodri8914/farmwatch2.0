{% extends "base.html" %}
{% block title %}Informes{% endblock %}

{% block content %}

<div class="report-container">

<h1>📑 Generar Informe</h1>

<div class="filters">

<label>Vaca:</label> <select id="vaca">

<option value="all">Todas</option>
</select>

<label>Inicio:</label> <input type="date" id="inicio">

<label>Fin:</label> <input type="date" id="fin">

<button id="generar">Generar informe</button>

</div>

<div id="analisis" class="analysis-box"></div>

<div class="stats">

<div>Temp promedio: <span id="temp_avg"></span></div>
<div>Temp máxima: <span id="temp_max"></span></div>
<div>Ritmo promedio: <span id="hr_avg"></span></div>
<div>Ritmo máximo: <span id="hr_max"></span></div>
<div>Estado: <span id="estado"></span></div>

</div>

<div class="charts">

<canvas id="tempChart"></canvas> <canvas id="hrChart"></canvas>

</div>

<div class="map-box">

<div id="map" style="height:400px;"></div>

</div>

<table id="tabla">

<thead>

<tr>
<th>Fecha</th>
<th>Temp</th>
<th>Ritmo</th>
<th>Lat</th>
<th>Lng</th>
</tr>

</thead>

<tbody></tbody>

</table>

<button id="exportPDF">Exportar PDF</button>

</div>
<script src="https://cdn.jsdelivr.net/npm/jspdf"></script>
<script src="https://cdn.jsdelivr.net/npm/jspdf-autotable"></script>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script src="{{ url_for('static', filename='js/reports.js') }}"></script>

{% endblock %}
