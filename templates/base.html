<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FarmWatch - Dashboard</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
    
    <link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/navbar.css') }}">
    {% block extra_css %}{% endblock %}
</head>
<body>

    {% if not login_page %}
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <i class="fas fa-paw"></i>
            <span>FarmWatch</span>
        </div>

        <nav class="sidebar-nav">
            <ul>
                <li class="{% if request.path == '/dashboard' %}active{% endif %}">
                    <a href="/dashboard"><i class="fas fa-chart-line"></i> <span>Dashboard</span></a>
                </li>
                <li><a href="/cows"><i class="fas fa-cow"></i> <span>Vacas</span></a></li>
                <li><a href="/sensors"><i class="fas fa-microchip"></i> <span>Sensores</span></a></li>
                <li><a href="/alerts"><i class="fas fa-bell"></i> <span>Alertas</span></a></li>
                <li><a href="/data"><i class="fas fa-table"></i> <span>Datos</span></a></li>
                <li><a href="/map"><i class="fas fa-map-marked-alt"></i> <span>Mapa</span></a></li>
                <li><a href="/reports"><i class="fas fa-file-alt"></i> <span>Informes</span></a></li>
            </ul>
        </nav>

        <div class="sidebar-footer">
            <div class="user-profile">
                <i class="fas fa-user-circle"></i>
                <div class="user-info">
                    <span class="username">Admin</span>
                    <a href="/" class="logout-btn">Cerrar sesión</a>
                </div>
            </div>
        </div>
    </aside>
    {% endif %}

    <div class="main-wrapper {% if login_page %}full-width{% endif %}">
        <header class="mobile-header">
            <i class="fas fa-bars" onclick="toggleSidebar()"></i>
            <span>FarmWatch</span>
            <i class="fas fa-user-circle"></i>
        </header>

        <main class="page-content">
            {% block content %}{% endblock %}
        </main>
    </div>

    <script>
        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('mobile-active');
        }
    </script>
    {% block extra_js %}{% endblock %}
</body>
</html>
