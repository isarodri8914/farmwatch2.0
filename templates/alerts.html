{% extends "base.html" %}

{% block extra_css %}
<link rel="stylesheet" href="{{ url_for('static', filename='css/alerts.css') }}">
{% endblock %}

{% block content %}

<div class="alerts-page">

    <div class="alerts-header">
        <h1>Centro de Alertas</h1>
        <span class="last-check" id="lastCheck">Verificando...</span>
    </div>

    <!-- ===== RESUMEN GENERAL ===== -->
    <div class="summary-strip" id="summaryStrip">
        <span class="summary-chip critical"><strong id="countCritical">--</strong> críticas</span>
        <span class="summary-chip warning"><strong id="countWarning">--</strong> advertencias</span>
        <span class="summary-chip success"><strong id="countOk">--</strong> en orden</span>
    </div>

    <div class="alerts-container">

        <div id="alertasSistema" class="alerts-col">
            <h2>⚠️ Sistema</h2>
            <ul id="listaSistema"></ul>
        </div>

        <div id="alertasVacas" class="alerts-col">
            <h2>🐄 Salud de Vacas</h2>
            <ul id="listaVacas"></ul>
        </div>

        <div id="alertasSensores" class="alerts-col">
            <h2>📡 Sensores</h2>
            <ul id="listaSensores"></ul>
        </div>

    </div>

</div>

{% endblock %}

{% block extra_js %}
<script src="{{ url_for('static', filename='js/alerts.js') }}"></script>
{% endblock %}
