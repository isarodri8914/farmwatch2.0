{% set login_page = True %}
{% extends "base.html" %}

{% block extra_css %}
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="{{ url_for('static', filename='css/login.css') }}">
{% endblock %}

{% block content %}
<div class="auth-wrapper">

  <!-- Regresar a la landing page -->
  <a href="{{ url_for('landing') }}" class="auth-back">
    <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M10 3L4 8l6 5" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>
    <span class="auth-back__mark" aria-hidden="true">
      <svg viewBox="0 0 32 32" fill="none"><circle cx="16" cy="16" r="15" stroke="currentColor" stroke-width="1.4" opacity="0.35"/><path d="M16 6 L16 16 L23 20" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/><circle cx="16" cy="16" r="2.4" fill="currentColor"/></svg>
    </span>
    Farm<strong>Watch</strong>
  </a>

  <div class="auth-card">
    <p class="auth-eyebrow"><span class="auth-eyebrow__dot"></span> Nuevo productor</p>
    <h2 class="title">Crea tu cuenta</h2>
    <p class="subtitle">Regístrate para empezar a monitorear tu hato en tiempo real</p>

    <form id="register-form" novalidate>
      <div class="auth-alert" id="authAlert" role="alert" aria-live="assertive" hidden></div>

      <div class="input-group">
        <span class="icon" aria-hidden="true">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="8" r="3.6" stroke="currentColor" stroke-width="1.6"/><path d="M4.5 20c1-4 4-6 7.5-6s6.5 2 7.5 6" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/></svg>
        </span>
        <input type="text" id="reg-nombre" placeholder="Nombre completo" aria-label="Nombre completo" autocomplete="name" required>
      </div>

      <div class="input-group">
        <span class="icon" aria-hidden="true">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><rect x="4" y="5" width="16" height="14" rx="2" stroke="currentColor" stroke-width="1.6"/><path d="M4.5 6.5l7.5 6 7.5-6" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </span>
        <input type="email" id="reg-correo" placeholder="Correo" aria-label="Correo electrónico" autocomplete="email" required>
      </div>

      <div class="input-group">
        <span class="icon" aria-hidden="true">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><rect x="5" y="10.5" width="14" height="9.5" rx="2" stroke="currentColor" stroke-width="1.6"/><path d="M8 10.5V7.5a4 4 0 118 0v3" stroke="currentColor" stroke-width="1.6"/></svg>
        </span>
        <input type="password" id="reg-pass" placeholder="Contraseña (mínimo 6 caracteres)" aria-label="Contraseña" autocomplete="new-password" minlength="6" required>
      </div>

      <button type="submit" class="btn-primary" id="registerBtn">
        <span class="btn-primary__text">Registrarse</span>
      </button>

      <p class="switch-link">
        ¿Ya tienes cuenta?
        <a href="{{ url_for('login') }}">Iniciar sesión</a>
      </p>
    </form>
  </div>
</div>
{% endblock %}
